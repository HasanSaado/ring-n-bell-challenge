<button
  type="button"
  (click)="sort.emit(sortKey)"
  [attr.aria-label]="ariaLabel"
  class="inline-flex items-center gap-1 rounded-md px-1.5 py-1 font-semibold uppercase tracking-wide text-slate-700 hover:bg-white hover:text-slate-950 focus:outline-none focus:ring-2 focus:ring-slate-400"
>
  {{ label }}
  @if (isAscending) {
    <svg lucideChevronUp size="14" aria-hidden="true"></svg>
  } @else if (isDescending) {
    <svg lucideChevronDown size="14" aria-hidden="true"></svg>
  } @else {
    <svg lucideChevronsUpDown size="14" aria-hidden="true"></svg>
  }
</button>
