<button
  type="button"
  (click)="sort.emit(sortKey)"
  [attr.aria-label]="ariaLabel"
  [attr.aria-pressed]="isActive"
  [attr.title]="ariaLabel"
  class="inline-flex items-center gap-1.5 rounded-lg px-1.5 py-1 font-semibold uppercase tracking-wide text-slate-600 transition hover:bg-white hover:text-slate-950 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400"
>
  <span>{{ label }}</span>
  @if (isAscending) {
    <svg lucideChevronUp size="14" aria-hidden="true"></svg>
  } @else if (isDescending) {
    <svg lucideChevronDown size="14" aria-hidden="true"></svg>
  } @else {
    <svg lucideChevronsUpDown size="14" aria-hidden="true" class="text-slate-400"></svg>
  }
</button>
